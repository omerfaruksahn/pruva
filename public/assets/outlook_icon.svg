<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f54c4"/>
      <stop offset="1" stop-color="#0a3995"/>
    </linearGradient>
    <linearGradient id="oGrad" x1="4" y1="12" x2="28" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e88e5"/>
      <stop offset="1" stop-color="#1565c0"/>
    </linearGradient>
    <filter id="oShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="1" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Main card (representing the mail/calendar container) -->
  <rect x="8" y="10" width="32" height="28" rx="4" fill="url(#bgGrad)"/>
  <!-- White envelope details inside the back card -->
  <path d="M12 16h24v16H12z" fill="none"/>
  <path d="M12 16l12 7.5L36 16v16H12V16z" fill="#ffffff" fill-opacity="0.1"/>
  <path d="M12 16l12 7.5L36 16" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- The overlaying "O" block -->
  <rect x="4" y="12" width="24" height="24" rx="4" fill="url(#oGrad)" filter="url(#oShadow)"/>
  <!-- Modern clean letter 'O' inside the overlay -->
  <circle cx="16" cy="24" r="5" fill="none" stroke="#ffffff" stroke-width="3"/>
</svg>
